<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1C1C1A" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PLAAT DEO" />
    <title>PLAAT DEO</title>
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <script>
      function plaatError(msg) {
        var d = document.getElementById('root') || document.body;
        d.innerHTML = '<pre style="white-space:pre-wrap;word-break:break-word;padding:18px;margin:0;font:13px/1.5 monospace;color:#8A1F1F;background:#FDECEC;min-height:100vh">⚠ ERROR PLAAT:\n\n' + msg + '</pre>';
      }
      window.addEventListener('error', function (e) {
        plaatError((e.message || e) + '\n\n' + (e.filename || '') + ' : línea ' + (e.lineno || '') + ':' + (e.colno || ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason || {};
        plaatError('Promesa rechazada:\n' + (r.message || r.toString ? r.toString() : JSON.stringify(r)));
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
